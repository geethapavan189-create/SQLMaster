[phases.setup]
nixPkgs = ["nodejs-20_x", "python311"]

[phases.install]
cmds = [
  "cd frontend && npm ci",
  "cd backend && pip install -r requirements.txt"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "cp -r frontend/dist backend/static"
]

[start]
cmd = "cd backend && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
